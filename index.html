  <script>
    /*
      МАССИВ УДАРЕНИЙ
      ----------------
      Формат:
      слово с ударением (одна заглавная гласная)
    */

    const STRESSED_WORDS = ["аэропОрты","бАнты","бОроду","бухгАлтеров","вероисповЕдание","водопровОд","газопровОд","граждАнство","дефИс","дешевИзна","диспансЕр","договорЁнность","докумЕнт","досУг","еретИк","жалюзИ","знАчимость","Иксы","каталОг","квартАл (во всех значениях)","киломЕтр","кОнусов","корЫсть","крАны","кремЕнь","кремнЯ","лЕкторов","лОктя","локтЕй","лыжнЯ","мЕстностей","намЕрение","нЕдруг","недУг","некролОг","нЕнависть","нефтепровОд","новостЕй","нОгтя","ногтЕй","Отзыв (о книге)","отзЫв (посла из страны)","Отрочество","партЕр","портфЕль","придАное","призЫв","свЁкла","сирОты","созЫв","сосредотОчение","срЕдства","стАтуя","столЯр","тамОжня","тОрты","тУфля","цемЕнт","цЕнтнер","цепОчка","шАрфы","шофЁр","экспЕрт","вернА","знАчимый","красИвее","красИвейший","кУхонный","ловкА","мозаИчный","оптОвый","прозорлИвый","прозорлИва","слИвовый","бралА","бралАсь","взялА","взялАсь","влилАсь","ворвалАсь","воспринЯть","воспринялА","воссоздалА","вручИт","гналА","гналАсь","добралА","добралАсь","дождалАсь","дозвонИтся","дозИровать","ждалА","закУпорить","занЯть","зАнял","занялА","зАняли","заперлА","запломбировАть","защемИт","звалА","звонИт","кАшлянуть","клАла","клЕить","крАлась","кровоточИть","лгалА","лилА","лилАсь","наделИт","надорвалАсь","назвалАсь","накренИтся","налилА","нарвалА","начАть","нАчал","началА","нАчали","обзвонИт","облегчИть","облегчИт","облилАсь","обнялАсь","обогналА","ободралА","ободрИть","ободрИт","ободрИться","ободрИтся","обострИть","одолжИть","одолжИт","озлОбить","оклЕить","окружИт","опОшлить","освЕдомиться","освЕдомится","отбылА","отдалА","откУпорить","отозвалА","отозвалАсь","перезвонИт","перелилА","плодоносИть","пломбировАть","повторИт","позвалА","позвонИт","полилА","положИть","положИл","понЯть","понялА","послАла","прибЫть","прИбыл","прибылА","прИбыли","принЯть","прИнял","принялА","прИняли","рвалА","сверлИт","снялА","создалА","сорвалА","убралА","углубИть","укрепИт","чЕрпать","щемИт","щЁлкать","довезЁнный","зАгнутый","зАнятый","занятА","зАпертый","заселЁнный","заселенА","кровоточАщий","нажИвший","налИвший","нанЯвшийся","начАвший","нАчатый","низведЁнный","облегчЁнный","ободрЁнный","обострЁнный","отключЁнный","повторЁнный","поделЁнный","понЯвший","прИнятый","принятА","приручЁнный","прожИвший","снятА","сОгнутый","углублЁнный","закУпорив","начАв","начАвшись","отдАв","понЯв","прибЫв","создАв","вОвремя","дОверху","дОнизу","дОсуха","зАсветло","красИвее","надОлго","ненадОлго"];
    /* ===================== */

    const VOWELS = "аеёиоуыэюя";
    const STORAGE_KEY = "stress-trainer";
    const SETTINGS_KEY = `${STORAGE_KEY}-settings`;
    const DEFAULT_DELAY_MS = 1000;

    function normalize(word) {
      return word
        .toLowerCase()
        .replace(/ё/g, "е");
    }

    const DATA = STRESSED_WORDS.map(original => {
      const normalized = normalize(original);
      const stressIndex = [...original].findIndex(c => VOWELS.includes(c.toLowerCase()) && c !== c.toLowerCase());

      return {
        original,
        normalized,
        stressIndex,
      };
    });

    function buildInitialState() {
      return {
        version: 2,
        index: 0,
        correct: 0,
        total: 0,
        finished: false,
        wrong: [],
      };
    }

    function normalizeState(raw) {
      if (!raw || typeof raw !== "object") return buildInitialState();

      const next = buildInitialState();
      next.index = Number.isInteger(raw.index) ? raw.index : 0;
      next.correct = Number.isInteger(raw.correct) ? raw.correct : 0;
      next.total = Number.isInteger(raw.total) ? raw.total : 0;
      next.finished = Boolean(raw.finished);
      next.wrong = Array.isArray(raw.wrong) ? raw.wrong.filter(item => item && typeof item === "object") : [];

      if (next.index >= DATA.length && DATA.length > 0) next.finished = true;
      return next;
    }

    function normalizeDelay(value) {
      if (value === undefined || value === null || value === "") return DEFAULT_DELAY_MS;
      const num = Number(value);
      if (!Number.isFinite(num) || num < 0) return DEFAULT_DELAY_MS;
      return Math.round(num);
    }

    function loadSettings() {
      try {
        const raw = JSON.parse(localStorage.getItem(SETTINGS_KEY));
        return {
          delayMs: normalizeDelay(raw && raw.delayMs),
        };
      } catch (error) {
        return { delayMs: DEFAULT_DELAY_MS };
      }
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    function updateDelay(value) {
      const num = Number(value);
      if (!Number.isFinite(num) || num < 0) return;
      settings.delayMs = Math.round(num);
      saveSettings();
    }

    let settings = loadSettings();

    let state = normalizeState(JSON.parse(localStorage.getItem(STORAGE_KEY)));
    let locked = false;

    const wordEl = document.getElementById("word");
    const resultEl = document.getElementById("result");
    const statsEl = document.getElementById("stats");
    const progressEl = document.getElementById("progress");
    const wrongListEl = document.getElementById("wrongList");
    const restartWrapEl = document.getElementById("restartWrap");
    const restartBtnEl = document.getElementById("restartBtn");
    const resetTestBtnEl = document.getElementById("resetTestBtn");
    const settingsBtnEl = document.getElementById("openSettingsBtn");
    const settingsDialogEl = document.getElementById("settingsDialog");
    const closeSettingsBtnEl = document.getElementById("closeSettingsBtn");
    const resetSettingsBtnEl = document.getElementById("resetSettingsBtn");
    const delayInputEl = document.getElementById("delayInput");

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function resetProgress() {
      localStorage.removeItem(STORAGE_KEY);
      state = buildInitialState();
      locked = false;
      render();
    }

    function formatWithStress(word, stressIndex) {
      if (stressIndex < 0) return word;
      return [...word]
        .map((ch, i) => (i === stressIndex ? ch.toUpperCase() : ch))
        .join("");
    }

    function renderWrongList() {
      if (!state.wrong.length) {
        wrongListEl.innerHTML = "<h3>Ошибки</h3><p>Пока ошибок нет.</p>";
        return;
      }

      const items = state.wrong
        .map(item => `<li>Ваш ответ: <b>${item.userAnswer}</b> | Правильный: <b>${item.correctAnswer}</b></li>`)
        .join("");
      wrongListEl.innerHTML = `<h3>Ошибки (${state.wrong.length})</h3><ul>${items}</ul>`;
    }

    function render() {
      if (!DATA.length) {
        wordEl.textContent = "Что-то пошло не так";
        return;
      }

      renderWrongList();

      if (state.finished || state.index >= DATA.length) {
        state.finished = true;
        save();
        wordEl.textContent = "Все слова пройдены";
        resultEl.textContent = "Тест завершен.";
        resultEl.className = "result";
        statsEl.textContent = `Итог: ${state.correct} / ${DATA.length}`;
        progressEl.textContent = `Пройдено: ${DATA.length} / ${DATA.length}`;
        restartWrapEl.classList.remove("hidden");
        resetTestBtnEl.classList.add("hidden");
        return;
      }

      const item = DATA[state.index];
      wordEl.innerHTML = "";
      resultEl.textContent = "";
      resultEl.className = "result";
      restartWrapEl.classList.add("hidden");
      resetTestBtnEl.classList.remove("hidden");
      locked = false;

      [...item.normalized].forEach((char, i) => {
        const span = document.createElement("span");
        span.className = "letter";
        span.textContent = char;
        if (/[a-zа-яё]/i.test(char)) {
          span.onclick = () => handleClick(i);
        } else {
          span.style.cursor = "default";
        }
        wordEl.appendChild(span);
      });

      statsEl.textContent = `Правильных ответов: ${state.correct} / ${state.total}`;
      progressEl.textContent = `Пройдено: ${state.index} / ${DATA.length}`;
    }

    function handleClick(index) {
      if (locked) return;

      const item = DATA[state.index];
      if (!item || item.stressIndex < 0) return;

      locked = true;
      const letters = document.querySelectorAll(".letter");
      const userAnswer = formatWithStress(item.normalized, index);
      const correctAnswer = item.original;

      state.total++;

      letters.forEach((l, i) => {
        if (i === item.stressIndex) l.classList.add("correct");
        if (i === index && i !== item.stressIndex) l.classList.add("wrong");
      });

      if (index === item.stressIndex) {
        state.correct++;
        resultEl.textContent = "Верно";
        resultEl.classList.add("ok");
      } else {
        resultEl.textContent = "Неверно";
        resultEl.classList.add("bad");
        state.wrong.push({
          word: item.normalized,
          userAnswer,
          correctAnswer,
          answeredAt: Date.now(),
        });
      }

      state.index++;
      if (state.index >= DATA.length) state.finished = true;
      save();
      renderWrongList();

      setTimeout(render, settings.delayMs);
    }

    restartBtnEl.addEventListener("click", resetProgress);
    resetTestBtnEl.addEventListener("click", resetProgress);

    if (delayInputEl) {
      delayInputEl.value = settings.delayMs;
      delayInputEl.addEventListener("input", () => {
        if (delayInputEl.value.trim() == "") return;
        updateDelay(delayInputEl.value);
      });
      delayInputEl.addEventListener("blur", () => {
        if (delayInputEl.value.trim() == "") {
          delayInputEl.value = settings.delayMs;
          return;
        }
        const num = Number(delayInputEl.value);
        if (!Number.isFinite(num) || num < 0) {
          delayInputEl.value = settings.delayMs;
        }
      });
    }

    if (settingsBtnEl && settingsDialogEl) {
      settingsBtnEl.addEventListener("click", () => {
    if (delayInputEl) delayInputEl.value = settings.delayMs;
        if (typeof settingsDialogEl.showModal === "function") {
          settingsDialogEl.showModal();
        } else {
          settingsDialogEl.setAttribute("open", "open");
        }
      });
    }

    if (closeSettingsBtnEl && settingsDialogEl) {
      closeSettingsBtnEl.addEventListener("click", () => {
        if (typeof settingsDialogEl.close === "function") {
          settingsDialogEl.close();
        } else {
          settingsDialogEl.removeAttribute("open");
        }
      });
    }

    if (settingsDialogEl) {
      settingsDialogEl.addEventListener("click", event => {
        if (event.target === settingsDialogEl) {
          if (typeof settingsDialogEl.close === "function") {
            settingsDialogEl.close();
          } else {
            settingsDialogEl.removeAttribute("open");
          }
        }
      });
    }

    if (resetSettingsBtnEl && delayInputEl) {
      resetSettingsBtnEl.addEventListener("click", () => {
        settings.delayMs = DEFAULT_DELAY_MS;
        saveSettings();
        delayInputEl.value = settings.delayMs;
      });
    }

    render();
  </script>


  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
